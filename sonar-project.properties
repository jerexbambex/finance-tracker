sonar.projectKey=jerexbambex_finance-tracker
sonar.organization=jerexbambex

# Exclude generated and non-product code from duplication detection.
# Tests repeat setup boilerplate by nature; Wayfinder output is generated.
sonar.cpd.exclusions=tests/**,database/factories/**,database/migrations/**,database/seeders/**,resources/js/actions/**,resources/js/routes/**,resources/js/wayfinder/**

# Generated / vendored code should not be analyzed at all.
sonar.exclusions=resources/js/actions/**,resources/js/routes/**,resources/js/wayfinder/**,bootstrap/ssr/**,public/build/**,vendor/**,node_modules/**

# Coverage isn't meaningful for tests, migrations, or generated code.
sonar.coverage.exclusions=tests/**,database/**,resources/js/actions/**,resources/js/routes/**,resources/js/wayfinder/**
